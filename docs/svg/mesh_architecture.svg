<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="10"/>
  <text x="450" y="30" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Mesh Module Architecture</text>
  <text x="450" y="48" text-anchor="middle" fill="#8b949e" font-size="11">Triangle mesh creation, manipulation, and format I/O</text>

  <!-- Core -->
  <rect x="320" y="65" width="260" height="75" rx="8" fill="#3498db" opacity="0.8" filter="url(#s)"/>
  <text x="450" y="88" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">MeshFeature</text>
  <g font-size="9" fill="#d6eaf8">
    <text x="335" y="108">PropertyMeshKernel Mesh</text>
    <text x="335" y="123">Feature → DocumentObject</text>
  </g>

  <!-- Kernel -->
  <rect x="30" y="160" width="200" height="110" rx="8" fill="#2ecc71" opacity="0.8" filter="url(#s)"/>
  <text x="130" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">MeshKernel</text>
  <g font-size="9" fill="#d5f5e3">
    <text x="45" y="203">Facet/Edge/Point arrays</text>
    <text x="45" y="218">WildMagic4 algorithms</text>
    <text x="45" y="233">Boolean operations</text>
    <text x="45" y="248">Evaluation & repair</text>
    <text x="45" y="263">Transformation</text>
  </g>

  <!-- I/O -->
  <rect x="250" y="160" width="200" height="110" rx="8" fill="#f39c12" opacity="0.8" filter="url(#s)"/>
  <text x="350" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Format I/O</text>
  <g font-size="9" fill="#fdebd0">
    <text x="265" y="203">STL (ASCII/Binary)</text>
    <text x="265" y="218">OBJ, PLY, OFF, AMF</text>
    <text x="265" y="233">3MF, BMS, VRML</text>
    <text x="265" y="248">SMF, AST</text>
    <text x="265" y="263">11+ formats total</text>
  </g>

  <!-- Operations -->
  <rect x="470" y="160" width="200" height="110" rx="8" fill="#9b59b6" opacity="0.8" filter="url(#s)"/>
  <text x="570" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Operations</text>
  <g font-size="9" fill="#e8daef">
    <text x="485" y="203">Decimation</text>
    <text x="485" y="218">Smoothing</text>
    <text x="485" y="233">Segmentation</text>
    <text x="485" y="248">Fill holes / Trim</text>
    <text x="485" y="263">Flip normals / Merge</text>
  </g>

  <!-- Python -->
  <rect x="690" y="160" width="180" height="110" rx="8" fill="#e74c3c" opacity="0.8" filter="url(#s)"/>
  <text x="780" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Python API</text>
  <g font-size="9" fill="#fadbd8">
    <text x="705" y="203">Mesh.Mesh()</text>
    <text x="705" y="218">Mesh.read()</text>
    <text x="705" y="233">Mesh.export()</text>
    <text x="705" y="248">Mesh.createSphere()</text>
    <text x="705" y="263">Mesh.createCone()</text>
  </g>

  <!-- Timeline -->
  <rect x="30" y="300" width="840" height="100" rx="8" fill="#1c2833" opacity="0.7"/>
  <text x="450" y="325" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="348" x2="820" y2="348" stroke="#34495e" stroke-width="2"/>
    <circle cx="120" cy="348" r="4" fill="#3498db"/><text x="120" y="370" text-anchor="middle">2002</text><text x="120" y="383" text-anchor="middle" fill="#bdc3c7">Original</text>
    <circle cx="320" cy="348" r="4" fill="#2ecc71"/><text x="320" y="370" text-anchor="middle">2006</text><text x="320" y="383" text-anchor="middle" fill="#bdc3c7">WildMagic4</text>
    <circle cx="520" cy="348" r="4" fill="#f39c12"/><text x="520" y="370" text-anchor="middle">2014</text><text x="520" y="383" text-anchor="middle" fill="#bdc3c7">3MF support</text>
    <circle cx="720" cy="348" r="4" fill="#9b59b6"/><text x="720" y="370" text-anchor="middle">2023</text><text x="720" y="383" text-anchor="middle" fill="#bdc3c7">Modern I/O</text>
  </g>
</svg>
