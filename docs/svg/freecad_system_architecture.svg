    <rect x="40" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="90" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">Points</text>
    <text x="90" y="305" text-anchor="middle">E57 · PLY</text>

    <rect x="150" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="200" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">Measure</text>
    <text x="200" y="305" text-anchor="middle">Dist · Angle</text>

    <rect x="260" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="310" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">Inspection</text>
    <text x="310" y="305" text-anchor="middle">Deviation</text>

    <rect x="370" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="420" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">RevEng</text>
    <text x="420" y="305" text-anchor="middle">Poisson · Fit</text>

    <rect x="480" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="530" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">Robot</text>
    <text x="530" y="305" text-anchor="middle">6-Axis · Traj</text>

    <rect x="590" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="640" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">OpenSCAD</text>
    <text x="640" y="305" text-anchor="middle">CSG Import</text>

    <rect x="700" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="750" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">Start</text>
    <text x="750" y="305" text-anchor="middle">Welcome</text>

    <rect x="810" y="270" width="110" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="865" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">AddonMgr</text>
    <text x="865" y="305" text-anchor="middle">99 py · Install</text>

    <rect x="930" y="270" width="100" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="980" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">Show</text>
    <text x="980" y="305" text-anchor="middle">TempoVis</text>

    <rect x="1040" y="270" width="120" height="45" rx="6" fill="#1c2833" opacity="0.85"/>
    <text x="1100" y="290" text-anchor="middle" fill="#d5d8dc" font-size="11">Help · Plot</text>
    <text x="1100" y="305" text-anchor="middle">Browser · MPL</text>
  </g>

  <!-- Cross-cutting systems band -->
  <rect x="40" y="340" width="1120" height="50" rx="8" fill="#922b21" opacity="0.7"/>
  <text x="600" y="365" text-anchor="middle" fill="#fadbd8" font-size="13" font-weight="bold">Cross-Cutting Systems</text>
  <g font-size="11" fill="#f5b7b1">
    <text x="120" y="380">Element Maps / TNP</text>
    <text x="300" y="380">Property System</text>
    <text x="460" y="380">Expression Engine</text>
    <text x="640" y="380">Link System</text>
    <text x="790" y="380">Extension Framework</text>
    <text x="980" y="380">Transaction System</text>
  </g>

  <!-- Connection arrows (simplified) -->
  <g stroke="#4a6fa5" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3">
    <!-- Modules to Gui -->
    <line x1="600" y1="315" x2="600" y2="475"/>
    <!-- Gui to App -->
    <line x1="600" y1="565" x2="600" y2="580"/>
    <!-- App to Base -->
    <line x1="600" y1="665" x2="600" y2="680"/>
    <!-- Base to External -->
    <line x1="600" y1="765" x2="600" y2="780"/>
  </g>

  <!-- Arrows labels -->
  <text x="615" y="430" fill="#4a6fa5" font-size="10" opacity="0.7">↕ ViewProviders / Commands</text>
  <text x="615" y="575" fill="#4a6fa5" font-size="10" opacity="0.7">↕ Properties / Objects</text>
  <text x="615" y="675" fill="#4a6fa5" font-size="10" opacity="0.7">↕ Math / IO / Types</text>
  <text x="615" y="775" fill="#4a6fa5" font-size="10" opacity="0.7">↕ OCC / Qt / Python</text>

  <!-- Legend -->
  <g transform="translate(40,440)">
    <rect width="12" height="12" rx="2" fill="url(#coreGrad)"/>
    <text x="18" y="11" fill="#8b949e" font-size="10">Core Framework</text>
    <rect x="130" width="12" height="12" rx="2" fill="url(#uiGrad)"/>
    <text x="148" y="11" fill="#8b949e" font-size="10">GUI Layer</text>
    <rect x="230" width="12" height="12" rx="2" fill="url(#modGrad)"/>
    <text x="248" y="11" fill="#8b949e" font-size="10">Major Modules</text>
    <rect x="350" width="12" height="12" rx="2" fill="#2c3e50"/>
    <text x="368" y="11" fill="#8b949e" font-size="10">Secondary Modules</text>
    <rect x="490" width="12" height="12" rx="2" fill="#1c2833"/>
    <text x="508" y="11" fill="#8b949e" font-size="10">Utility Modules</text>
    <rect x="620" width="12" height="12" rx="2" fill="#922b21" opacity="0.7"/>
    <text x="638" y="11" fill="#8b949e" font-size="10">Cross-Cutting</text>
    <rect x="740" width="12" height="12" rx="2" fill="url(#extGrad)"/>
    <text x="758" y="11" fill="#8b949e" font-size="10">External Libs</text>
  </g>
</svg>
