<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a5276"/><stop offset="100%" stop-color="#2980b9"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e8449"/><stop offset="100%" stop-color="#27ae60"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b9770e"/><stop offset="100%" stop-color="#f39c12"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#922b21"/><stop offset="100%" stop-color="#e74c3c"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c3483"/><stop offset="100%" stop-color="#a569bd"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="700" fill="url(#bg)" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">App Module Architecture (FreeCADApp)</text>
  <text x="500" y="55" text-anchor="middle" fill="#8b949e" font-size="12">90 .cpp · 80 .h · Core application framework — document, property, and object model</text>

  <!-- Document System -->
  <rect x="30" y="75" width="450" height="135" rx="8" fill="url(#blue)" opacity="0.9" filter="url(#s)"/>
  <text x="255" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📄 Document System</text>
  <g font-size="11" fill="#d6eaf8">
    <rect x="45" y="110" width="130" height="28" rx="4" fill="#1a3c5e"/>
    <text x="110" y="129" text-anchor="middle">Application</text>
    <rect x="185" y="110" width="130" height="28" rx="4" fill="#1a3c5e"/>
    <text x="250" y="129" text-anchor="middle">Document</text>
    <rect x="325" y="110" width="130" height="28" rx="4" fill="#1a3c5e"/>
    <text x="390" y="129" text-anchor="middle">DocumentObject</text>
    <rect x="45" y="148" width="200" height="28" rx="4" fill="#1a3c5e"/>
    <text x="145" y="167" text-anchor="middle">Transaction · Undo/Redo</text>
    <rect x="255" y="148" width="200" height="28" rx="4" fill="#1a3c5e"/>
    <text x="355" y="167" text-anchor="middle">AutoTransaction · Save/Load</text>
  </g>
  <!-- Arrow: Doc → Obj -->
  <text x="220" y="195" fill="#5dade2" font-size="10">Document ──contains──▶ DocumentObjects</text>

  <!-- Property System -->
  <rect x="520" y="75" width="450" height="135" rx="8" fill="url(#green)" opacity="0.9" filter="url(#s)"/>
  <text x="745" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔧 Property System</text>
  <g font-size="11" fill="#d5f5e3">
    <rect x="535" y="110" width="140" height="28" rx="4" fill="#145a32"/>
    <text x="605" y="129" text-anchor="middle">PropertyContainer</text>
    <rect x="685" y="110" width="100" height="28" rx="4" fill="#145a32"/>
    <text x="735" y="129" text-anchor="middle">Property</text>
    <rect x="795" y="110" width="150" height="28" rx="4" fill="#145a32"/>
    <text x="870" y="129" text-anchor="middle">DynamicProperty</text>
    <rect x="535" y="148" width="100" height="28" rx="4" fill="#145a32"/>
    <text x="585" y="167" text-anchor="middle">Prop*Float</text>
    <rect x="645" y="148" width="100" height="28" rx="4" fill="#145a32"/>
    <text x="695" y="167" text-anchor="middle">Prop*String</text>
    <rect x="755" y="148" width="100" height="28" rx="4" fill="#145a32"/>
    <text x="805" y="167" text-anchor="middle">Prop*Link*</text>
    <rect x="865" y="148" width="80" height="28" rx="4" fill="#145a32"/>
    <text x="905" y="167" text-anchor="middle">Prop*Geo</text>
  </g>

  <!-- Element Map / TNP -->
  <rect x="30" y="230" width="450" height="130" rx="8" fill="url(#red)" opacity="0.85" filter="url(#s)"/>
  <text x="255" y="255" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🗺️ Element Map / TNP System</text>
  <g font-size="11" fill="#fadbd8">
    <rect x="45" y="265" width="130" height="28" rx="4" fill="#641e16"/>
    <text x="110" y="284" text-anchor="middle">ElementMap</text>
    <rect x="185" y="265" width="130" height="28" rx="4" fill="#641e16"/>
    <text x="250" y="284" text-anchor="middle">StringHasher</text>
    <rect x="325" y="265" width="130" height="28" rx="4" fill="#641e16"/>
    <text x="390" y="284" text-anchor="middle">ComplexGeoData</text>
    <rect x="45" y="303" width="200" height="28" rx="4" fill="#641e16"/>
    <text x="145" y="322" text-anchor="middle">ElementNamingUtils</text>
    <rect x="255" y="303" width="200" height="28" rx="4" fill="#641e16"/>
    <text x="355" y="322" text-anchor="middle">MappedName · IndexedName</text>
  </g>

  <!-- Expression Engine -->
  <rect x="520" y="230" width="450" height="130" rx="8" fill="url(#orange)" opacity="0.85" filter="url(#s)"/>
  <text x="745" y="255" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📐 Expression Engine</text>
  <g font-size="11" fill="#fdebd0">
    <rect x="535" y="265" width="130" height="28" rx="4" fill="#7e5109"/>
    <text x="600" y="284" text-anchor="middle">Expression</text>
    <rect x="675" y="265" width="130" height="28" rx="4" fill="#7e5109"/>
    <text x="740" y="284" text-anchor="middle">ExpressionParser</text>
    <rect x="815" y="265" width="130" height="28" rx="4" fill="#7e5109"/>
    <text x="880" y="284" text-anchor="middle">ObjectIdentifier</text>
    <rect x="535" y="303" width="200" height="28" rx="4" fill="#7e5109"/>
    <text x="635" y="322" text-anchor="middle">OperatorExpression</text>
    <rect x="745" y="303" width="200" height="28" rx="4" fill="#7e5109"/>
    <text x="845" y="322" text-anchor="middle">FunctionExpression</text>
  </g>

  <!-- Extension Framework -->
  <rect x="30" y="380" width="300" height="120" rx="8" fill="url(#purple)" opacity="0.8" filter="url(#s)"/>
  <text x="180" y="405" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🧩 Extensions</text>
  <g font-size="11" fill="#e8daef">
    <rect x="45" y="415" width="260" height="25" rx="4" fill="#4a235a"/>
    <text x="175" y="432" text-anchor="middle">ExtensionContainer · Extension</text>
    <rect x="45" y="448" width="260" height="25" rx="4" fill="#4a235a"/>
    <text x="175" y="465" text-anchor="middle">GroupExt · OriginGroupExt · GeoFeatureGroupExt</text>
  </g>

  <!-- Link System -->
  <rect x="350" y="380" width="300" height="120" rx="8" fill="#1a5276" opacity="0.8" filter="url(#s)"/>
  <text x="500" y="405" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔗 Link System</text>
  <g font-size="11" fill="#d6eaf8">
    <rect x="365" y="415" width="260" height="25" rx="4" fill="#0e2f44"/>
    <text x="495" y="432" text-anchor="middle">Link · LinkElement · LinkGroup</text>
    <rect x="365" y="448" width="260" height="25" rx="4" fill="#0e2f44"/>
    <text x="495" y="465" text-anchor="middle">PropertyLink · PropertyLinkSub · ShadowSub</text>
  </g>

  <!-- Feature Classes -->
  <rect x="670" y="380" width="300" height="120" rx="8" fill="#1e8449" opacity="0.8" filter="url(#s)"/>
  <text x="820" y="405" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⚙️ Feature Classes</text>
  <g font-size="11" fill="#d5f5e3">
    <rect x="685" y="415" width="260" height="25" rx="4" fill="#145a32"/>
    <text x="815" y="432" text-anchor="middle">GeoFeature · FeaturePython</text>
    <rect x="685" y="448" width="260" height="25" rx="4" fill="#145a32"/>
    <text x="815" y="465" text-anchor="middle">Origin · Plane · Line · MeasureManager</text>
  </g>

  <!-- Data flow arrows -->
  <g stroke="#5dade2" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.6">
    <path d="M 255 210 L 255 230"/>
    <path d="M 745 210 L 745 230"/>
    <path d="M 480 170 L 520 170"/>
    <path d="M 480 300 L 520 300"/>
  </g>

  <!-- History -->
  <rect x="30" y="520" width="940" height="160" rx="8" fill="#1c2833" opacity="0.8"/>
  <text x="500" y="545" text-anchor="middle" fill="#aeb6bf" font-size="14" font-weight="bold">📅 App Module Evolution</text>

  <g font-size="10" fill="#7f8c8d">
    <line x1="80" y1="575" x2="920" y2="575" stroke="#34495e" stroke-width="2"/>
    <circle cx="80" cy="575" r="5" fill="#e74c3c"/><text x="80" y="598" text-anchor="middle">2002</text>
    <text x="80" y="565" text-anchor="middle" fill="#bdc3c7" font-size="9">Document</text>
    <text x="80" y="555" text-anchor="middle" fill="#bdc3c7" font-size="9">System</text>

    <circle cx="200" cy="575" r="5" fill="#e67e22"/><text x="200" y="598" text-anchor="middle">2008</text>
    <text x="200" y="565" text-anchor="middle" fill="#bdc3c7" font-size="9">Property</text>
    <text x="200" y="555" text-anchor="middle" fill="#bdc3c7" font-size="9">Framework</text>

    <circle cx="340" cy="575" r="5" fill="#f1c40f"/><text x="340" y="598" text-anchor="middle">2016</text>
    <text x="340" y="565" text-anchor="middle" fill="#bdc3c7" font-size="9">Expression</text>
    <text x="340" y="555" text-anchor="middle" fill="#bdc3c7" font-size="9">Engine</text>

    <circle cx="480" cy="575" r="5" fill="#2ecc71"/><text x="480" y="598" text-anchor="middle">2019</text>
    <text x="480" y="565" text-anchor="middle" fill="#bdc3c7" font-size="9">Link/Assembly</text>
    <text x="480" y="555" text-anchor="middle" fill="#bdc3c7" font-size="9">realthunder</text>

    <circle cx="620" cy="575" r="5" fill="#3498db"/><text x="620" y="598" text-anchor="middle">2023</text>
    <text x="620" y="565" text-anchor="middle" fill="#bdc3c7" font-size="9">TNP Merge</text>
    <text x="620" y="555" text-anchor="middle" fill="#bdc3c7" font-size="9">ElementMap</text>

    <circle cx="760" cy="575" r="5" fill="#9b59b6"/><text x="760" y="598" text-anchor="middle">2025</text>
    <text x="760" y="565" text-anchor="middle" fill="#bdc3c7" font-size="9">Extensions</text>
    <text x="760" y="555" text-anchor="middle" fill="#bdc3c7" font-size="9">Cleanup</text>

    <circle cx="900" cy="575" r="5" fill="#1abc9c"/><text x="900" y="598" text-anchor="middle">2026</text>
    <text x="900" y="565" text-anchor="middle" fill="#bdc3c7" font-size="9">TNP Fixes</text>
    <text x="900" y="555" text-anchor="middle" fill="#bdc3c7" font-size="9">DressUp</text>
  </g>

  <!-- Key metrics -->
  <g transform="translate(80, 625)" font-size="11">
    <rect width="160" height="35" rx="5" fill="#27ae60" opacity="0.3"/>
    <text x="80" y="22" text-anchor="middle" fill="#2ecc71" font-weight="bold">~170 Source Files</text>
  </g>
  <g transform="translate(280, 625)" font-size="11">
    <rect width="160" height="35" rx="5" fill="#3498db" opacity="0.3"/>
    <text x="80" y="22" text-anchor="middle" fill="#5dade2" font-weight="bold">~50 Property Types</text>
  </g>
  <g transform="translate(480, 625)" font-size="11">
    <rect width="160" height="35" rx="5" fill="#e74c3c" opacity="0.3"/>
    <text x="80" y="22" text-anchor="middle" fill="#e74c3c" font-weight="bold">ElementMap + TNP</text>
  </g>
  <g transform="translate(680, 625)" font-size="11">
    <rect width="160" height="35" rx="5" fill="#f39c12" opacity="0.3"/>
    <text x="80" y="22" text-anchor="middle" fill="#f39c12" font-weight="bold">Expression Parser</text>
  </g>
</svg>
