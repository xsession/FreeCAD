<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">Assembly Module — Constraint-Based Assembly</text>
  <text x="500" y="55" text-anchor="middle" fill="#8b949e" font-size="12">29 .cpp · 20 .h · 24 .py — Ondsel Solver powered multi-body assembly</text>

  <!-- Assembly Object -->
  <rect x="30" y="75" width="940" height="70" rx="8" fill="#1a5276" opacity="0.9" filter="url(#s)"/>
  <text x="500" y="100" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🔗 AssemblyObject — Assembly Container</text>
  <text x="500" y="120" text-anchor="middle" fill="#85c1e9" font-size="11">Contains Parts (bodies/links) + Joints (constraints) → Ondsel Solver resolves positions</text>

  <!-- Joints -->
  <rect x="30" y="160" width="620" height="155" rx="8" fill="#1e8449" opacity="0.85" filter="url(#s)"/>
  <text x="340" y="185" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔩 Joint Types</text>
  <g font-size="10" fill="#d5f5e3">
    <rect x="45" y="200" width="140" height="24" rx="4" fill="#145a32"/><text x="115" y="216" text-anchor="middle">Fixed</text>
    <rect x="195" y="200" width="140" height="24" rx="4" fill="#145a32"/><text x="265" y="216" text-anchor="middle">Revolute (hinge)</text>
    <rect x="345" y="200" width="140" height="24" rx="4" fill="#145a32"/><text x="415" y="216" text-anchor="middle">Cylindrical</text>
    <rect x="495" y="200" width="140" height="24" rx="4" fill="#145a32"/><text x="565" y="216" text-anchor="middle">Slider</text>
    <rect x="45" y="232" width="140" height="24" rx="4" fill="#145a32"/><text x="115" y="248" text-anchor="middle">Ball</text>
    <rect x="195" y="232" width="140" height="24" rx="4" fill="#145a32"/><text x="265" y="248" text-anchor="middle">Planar</text>
    <rect x="345" y="232" width="140" height="24" rx="4" fill="#145a32"/><text x="415" y="248" text-anchor="middle">Parallel</text>
    <rect x="495" y="232" width="140" height="24" rx="4" fill="#145a32"/><text x="565" y="248" text-anchor="middle">Perpendicular</text>
    <rect x="45" y="264" width="140" height="24" rx="4" fill="#145a32"/><text x="115" y="280" text-anchor="middle">Angle</text>
    <rect x="195" y="264" width="140" height="24" rx="4" fill="#145a32"/><text x="265" y="280" text-anchor="middle">Distance</text>
    <rect x="345" y="264" width="140" height="24" rx="4" fill="#145a32"/><text x="415" y="280" text-anchor="middle">RackPinion</text>
    <rect x="495" y="264" width="140" height="24" rx="4" fill="#145a32"/><text x="565" y="280" text-anchor="middle">Screw · Gears · Belt</text>
  </g>

  <!-- Solver -->
  <rect x="670" y="160" width="300" height="155" rx="8" fill="#b9770e" opacity="0.85" filter="url(#s)"/>
  <text x="820" y="185" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⚡ Ondsel Solver</text>
  <g font-size="10" fill="#fdebd0">
    <rect x="685" y="205" width="260" height="22" rx="4" fill="#7e5109"/><text x="815" y="220" text-anchor="middle">libOndselSolver (C++ lib)</text>
    <rect x="685" y="235" width="260" height="22" rx="4" fill="#7e5109"/><text x="815" y="250" text-anchor="middle">Kinematic constraint resolution</text>
    <rect x="685" y="265" width="260" height="22" rx="4" fill="#7e5109"/><text x="815" y="280" text-anchor="middle">Multi-body dynamics engine</text>
    <rect x="685" y="295" width="260" height="14" rx="2" fill="none" stroke="#f39c12" stroke-width="0.5"/>
    <text x="815" y="306" text-anchor="middle" fill="#fad7a0" font-size="9">Donated by Ondsel Inc. (open-sourced 2024)</text>
  </g>

  <!-- BOM & Exploded View -->
  <rect x="30" y="330" width="460" height="100" rx="8" fill="#6c3483" opacity="0.8" filter="url(#s)"/>
  <text x="260" y="355" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📋 BOM &amp; Utilities</text>
  <g font-size="10" fill="#e8daef">
    <rect x="45" y="370" width="200" height="24" rx="4" fill="#4a235a"/><text x="145" y="386" text-anchor="middle">BomObject (Bill of Materials)</text>
    <rect x="255" y="370" width="220" height="24" rx="4" fill="#4a235a"/><text x="365" y="386" text-anchor="middle">Exploded View generation</text>
    <rect x="45" y="402" width="430" height="14" rx="2" fill="none" stroke="#9b59b6" stroke-width="0.5"/>
    <text x="260" y="413" text-anchor="middle" fill="#d2b4de" font-size="9">Drag &amp; drop assembly · Part grounding · Joint animation</text>
  </g>

  <!-- Dependencies -->
  <rect x="510" y="330" width="460" height="100" rx="8" fill="#1c2833" opacity="0.85"/>
  <text x="740" y="355" text-anchor="middle" fill="#ecf0f1" font-size="13" font-weight="bold">🔗 Integration</text>
  <g font-size="10" fill="#bdc3c7">
    <text x="530" y="378">Uses Part::Link system for lightweight part references</text>
    <text x="530" y="398">Bodies from PartDesign become assembly components</text>
    <text x="530" y="418">Joint references use TNP-stable element names</text>
  </g>

  <!-- Timeline -->
  <rect x="30" y="445" width="940" height="140" rx="8" fill="#1c2833" opacity="0.6"/>
  <text x="500" y="470" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 Assembly History &amp; Context</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="500" x2="920" y2="500" stroke="#34495e" stroke-width="2"/>
    <circle cx="80" cy="500" r="4" fill="#e74c3c"/><text x="80" y="520" text-anchor="middle">2016 A2plus</text>
    <text x="80" y="533" text-anchor="middle" fill="#bdc3c7">(addon)</text>
    <circle cx="220" cy="500" r="4" fill="#e67e22"/><text x="220" y="520" text-anchor="middle">2018 Assembly3</text>
    <text x="220" y="533" text-anchor="middle" fill="#bdc3c7">(realthunder)</text>
    <circle cx="380" cy="500" r="4" fill="#f1c40f"/><text x="380" y="520" text-anchor="middle">2019 Assembly4</text>
    <text x="380" y="533" text-anchor="middle" fill="#bdc3c7">(addon)</text>
    <circle cx="540" cy="500" r="4" fill="#2ecc71"/><text x="540" y="520" text-anchor="middle">2023 Ondsel</text>
    <text x="540" y="533" text-anchor="middle" fill="#bdc3c7">solver donated</text>
    <circle cx="700" cy="500" r="4" fill="#3498db"/><text x="700" y="520" text-anchor="middle">2024 Assembly</text>
    <text x="700" y="533" text-anchor="middle" fill="#bdc3c7">in core (1.0)</text>
    <circle cx="860" cy="500" r="4" fill="#9b59b6"/><text x="860" y="520" text-anchor="middle">2025 Gears</text>
    <text x="860" y="533" text-anchor="middle" fill="#bdc3c7">Belt · Screw</text>
  </g>
  <text x="500" y="570" text-anchor="middle" fill="#7f8c8d" font-size="10">Assembly was FreeCAD's "most requested feature" for over a decade. Multiple community solutions existed before the official module.</text>
</svg>
