<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a5276"/><stop offset="100%" stop-color="#2980b9"/></linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#117a65"/><stop offset="100%" stop-color="#1abc9c"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="650" fill="url(#bg)" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">Base Module Architecture (FreeCADBase)</text>
  <text x="500" y="55" text-anchor="middle" fill="#8b949e" font-size="12">72 .cpp · 72 .h · Lowest-level library — no FreeCAD dependencies</text>

  <!-- Math Primitives -->
  <rect x="30" y="80" width="300" height="170" rx="8" fill="url(#blue)" opacity="0.85" filter="url(#s)"/>
  <text x="180" y="105" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🧮 Math Primitives</text>
  <g font-size="11" fill="#d6eaf8">
    <rect x="45" y="115" width="120" height="25" rx="4" fill="#1a3c5e"/>
    <text x="105" y="132" text-anchor="middle">Vector3d</text>
    <rect x="175" y="115" width="120" height="25" rx="4" fill="#1a3c5e"/>
    <text x="235" y="132" text-anchor="middle">Matrix4D</text>
    <rect x="45" y="148" width="120" height="25" rx="4" fill="#1a3c5e"/>
    <text x="105" y="165" text-anchor="middle">Placement</text>
    <rect x="175" y="148" width="120" height="25" rx="4" fill="#1a3c5e"/>
    <text x="235" y="165" text-anchor="middle">Rotation</text>
    <rect x="45" y="181" width="120" height="25" rx="4" fill="#1a3c5e"/>
    <text x="105" y="198" text-anchor="middle">BoundBox</text>
    <rect x="175" y="181" width="120" height="25" rx="4" fill="#1a3c5e"/>
    <text x="235" y="198" text-anchor="middle">Axis</text>
    <rect x="45" y="214" width="250" height="25" rx="4" fill="#1a3c5e"/>
    <text x="170" y="231" text-anchor="middle">CoordinateSystem · DualQuaternion</text>
  </g>

  <!-- Units System -->
  <rect x="350" y="80" width="300" height="170" rx="8" fill="url(#teal)" opacity="0.85" filter="url(#s)"/>
  <text x="500" y="105" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📏 Units System</text>
  <g font-size="11" fill="#d1f2eb">
    <rect x="365" y="115" width="120" height="25" rx="4" fill="#0e4f3f"/>
    <text x="425" y="132" text-anchor="middle">Quantity</text>
    <rect x="495" y="115" width="120" height="25" rx="4" fill="#0e4f3f"/>
    <text x="555" y="132" text-anchor="middle">Unit</text>
    <rect x="365" y="148" width="250" height="25" rx="4" fill="#0e4f3f"/>
    <text x="490" y="165" text-anchor="middle">UnitsApi · UnitsSchema*</text>
    <rect x="365" y="181" width="250" height="25" rx="4" fill="#0e4f3f"/>
    <text x="490" y="198" text-anchor="middle">UnitsMmGS · UnitsImperial · etc.</text>
    <rect x="365" y="214" width="250" height="25" rx="4" fill="#0e4f3f"/>
    <text x="490" y="231" text-anchor="middle">QuantityParser · QuantityLexer</text>
  </g>

  <!-- Type System -->
  <rect x="670" y="80" width="300" height="170" rx="8" fill="#7d3c98" opacity="0.7" filter="url(#s)"/>
  <text x="820" y="105" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🏷️ Type System</text>
  <g font-size="11" fill="#e8daef">
    <rect x="685" y="115" width="120" height="25" rx="4" fill="#4a235a"/>
    <text x="745" y="132" text-anchor="middle">BaseClass</text>
    <rect x="815" y="115" width="120" height="25" rx="4" fill="#4a235a"/>
    <text x="875" y="132" text-anchor="middle">Type</text>
    <rect x="685" y="148" width="250" height="25" rx="4" fill="#4a235a"/>
    <text x="810" y="165" text-anchor="middle">TYPESYSTEM_HEADER macros</text>
    <rect x="685" y="181" width="250" height="25" rx="4" fill="#4a235a"/>
    <text x="810" y="198" text-anchor="middle">isDerivedFrom&lt;T&gt;() · freecad_cast</text>
    <rect x="685" y="214" width="250" height="25" rx="4" fill="#4a235a"/>
    <text x="810" y="231" text-anchor="middle">TypeRegistration · getClassTypeId()</text>
  </g>

  <!-- Serialization -->
  <rect x="30" y="270" width="300" height="145" rx="8" fill="#b9770e" opacity="0.7" filter="url(#s)"/>
  <text x="180" y="295" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">💾 Serialization / IO</text>
  <g font-size="11" fill="#fdebd0">
    <rect x="45" y="305" width="120" height="25" rx="4" fill="#7e5109"/>
    <text x="105" y="322" text-anchor="middle">Persistence</text>
    <rect x="175" y="305" width="120" height="25" rx="4" fill="#7e5109"/>
    <text x="235" y="322" text-anchor="middle">Reader</text>
    <rect x="45" y="338" width="120" height="25" rx="4" fill="#7e5109"/>
    <text x="105" y="355" text-anchor="middle">Writer</text>
    <rect x="175" y="338" width="120" height="25" rx="4" fill="#7e5109"/>
    <text x="235" y="355" text-anchor="middle">XMLReader</text>
    <rect x="45" y="371" width="250" height="25" rx="4" fill="#7e5109"/>
    <text x="170" y="388" text-anchor="middle">FileInfo · Stream · ZipFile</text>
  </g>

  <!-- Console & Logging -->
  <rect x="350" y="270" width="300" height="145" rx="8" fill="#922b21" opacity="0.7" filter="url(#s)"/>
  <text x="500" y="295" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📋 Console &amp; Logging</text>
  <g font-size="11" fill="#fadbd8">
    <rect x="365" y="305" width="250" height="25" rx="4" fill="#641e16"/>
    <text x="490" y="322" text-anchor="middle">Console (Log/Msg/Warn/Error)</text>
    <rect x="365" y="338" width="120" height="25" rx="4" fill="#641e16"/>
    <text x="425" y="355" text-anchor="middle">ConsoleSingleton</text>
    <rect x="495" y="338" width="120" height="25" rx="4" fill="#641e16"/>
    <text x="555" y="355" text-anchor="middle">ConsoleObserver</text>
    <rect x="365" y="371" width="250" height="25" rx="4" fill="#641e16"/>
    <text x="490" y="388" text-anchor="middle">Parameter (XML preferences)</text>
  </g>

  <!-- Python Integration -->
  <rect x="670" y="270" width="300" height="145" rx="8" fill="#1a5276" opacity="0.7" filter="url(#s)"/>
  <text x="820" y="295" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🐍 Python Integration</text>
  <g font-size="11" fill="#d6eaf8">
    <rect x="685" y="305" width="250" height="25" rx="4" fill="#0e2f44"/>
    <text x="810" y="322" text-anchor="middle">Interpreter (GIL, init, finalize)</text>
    <rect x="685" y="338" width="120" height="25" rx="4" fill="#0e2f44"/>
    <text x="745" y="355" text-anchor="middle">PyObjectBase</text>
    <rect x="815" y="338" width="120" height="25" rx="4" fill="#0e2f44"/>
    <text x="875" y="355" text-anchor="middle">PyExport</text>
    <rect x="685" y="371" width="250" height="25" rx="4" fill="#0e2f44"/>
    <text x="810" y="388" text-anchor="middle">Swigxxrun · PyTools</text>
  </g>

  <!-- Exception Handling -->
  <rect x="30" y="435" width="460" height="90" rx="8" fill="#2c3e50" opacity="0.85" filter="url(#s)"/>
  <text x="260" y="460" text-anchor="middle" fill="#ecf0f1" font-size="14" font-weight="bold">⚠️ Exception Hierarchy</text>
  <g font-size="11" fill="#bdc3c7">
    <text x="50" y="485">Exception → RuntimeError → CADKernelError</text>
    <text x="50" y="505">         → ValueError → BadFormatError → RestoreError</text>
  </g>

  <!-- Dependencies -->
  <rect x="510" y="435" width="460" height="90" rx="8" fill="#2c3e50" opacity="0.85" filter="url(#s)"/>
  <text x="740" y="460" text-anchor="middle" fill="#ecf0f1" font-size="14" font-weight="bold">📦 External Dependencies</text>
  <g font-size="11" fill="#bdc3c7">
    <text x="530" y="485">Python 3.12 · Boost (filesystem, regex, program_options)</text>
    <text x="530" y="505">Xerces-C (XML) · zlib (compression) · fmt (formatting)</text>
  </g>

  <!-- History timeline -->
  <rect x="30" y="545" width="940" height="85" rx="8" fill="#1c2833" opacity="0.8"/>
  <text x="500" y="570" text-anchor="middle" fill="#aeb6bf" font-size="13" font-weight="bold">📅 Historical Timeline</text>
  <g font-size="10" fill="#7f8c8d">
    <line x1="80" y1="590" x2="920" y2="590" stroke="#34495e" stroke-width="2"/>
    <circle cx="80" cy="590" r="4" fill="#e74c3c"/><text x="80" y="615" text-anchor="middle">2002</text><text x="80" y="583" text-anchor="middle" fill="#aeb6bf">Initial</text>
    <circle cx="220" cy="590" r="4" fill="#e67e22"/><text x="220" y="615" text-anchor="middle">2006</text><text x="220" y="583" text-anchor="middle" fill="#aeb6bf">Units</text>
    <circle cx="360" cy="590" r="4" fill="#f1c40f"/><text x="360" y="615" text-anchor="middle">2014</text><text x="360" y="583" text-anchor="middle" fill="#aeb6bf">Quantity</text>
    <circle cx="500" cy="590" r="4" fill="#2ecc71"/><text x="500" y="615" text-anchor="middle">2019</text><text x="500" y="583" text-anchor="middle" fill="#aeb6bf">DualQuat</text>
    <circle cx="640" cy="590" r="4" fill="#3498db"/><text x="640" y="615" text-anchor="middle">2023</text><text x="640" y="583" text-anchor="middle" fill="#aeb6bf">TypeSys</text>
    <circle cx="780" cy="590" r="4" fill="#9b59b6"/><text x="780" y="615" text-anchor="middle">2025</text><text x="780" y="583" text-anchor="middle" fill="#aeb6bf">pragma once</text>
    <circle cx="920" cy="590" r="4" fill="#1abc9c"/><text x="920" y="615" text-anchor="middle">2026</text><text x="920" y="583" text-anchor="middle" fill="#aeb6bf">SPDX</text>
  </g>
</svg>
