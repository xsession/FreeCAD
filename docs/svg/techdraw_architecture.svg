<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="650" fill="url(#bg)" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">TechDraw Module — Technical Drawing Generation</text>
  <text x="500" y="55" text-anchor="middle" fill="#8b949e" font-size="12">241 .cpp · 209 .h · 36 .py — 2D engineering drawing projection &amp; annotation</text>

  <!-- DrawPage -->
  <rect x="30" y="75" width="940" height="70" rx="8" fill="#1a5276" opacity="0.9" filter="url(#s)"/>
  <text x="500" y="100" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">📄 DrawPage — Drawing Sheet Container</text>
  <text x="500" y="120" text-anchor="middle" fill="#85c1e9" font-size="11">Template (SVG) + Views + Dimensions + Annotations → PDF/SVG export</text>

  <!-- Views -->
  <rect x="30" y="160" width="460" height="155" rx="8" fill="#1e8449" opacity="0.85" filter="url(#s)"/>
  <text x="260" y="185" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">👁️ View Types</text>
  <g font-size="10" fill="#d5f5e3">
    <rect x="45" y="200" width="200" height="22" rx="4" fill="#145a32"/><text x="145" y="215" text-anchor="middle">DrawViewPart (3D→2D projection)</text>
    <rect x="255" y="200" width="220" height="22" rx="4" fill="#145a32"/><text x="365" y="215" text-anchor="middle">DrawViewSection (cross-section)</text>
    <rect x="45" y="230" width="200" height="22" rx="4" fill="#145a32"/><text x="145" y="245" text-anchor="middle">DrawProjGroup (1st/3rd angle)</text>
    <rect x="255" y="230" width="220" height="22" rx="4" fill="#145a32"/><text x="365" y="245" text-anchor="middle">DrawViewDetail (detail circle)</text>
    <rect x="45" y="260" width="200" height="22" rx="4" fill="#145a32"/><text x="145" y="275" text-anchor="middle">DrawViewSpreadsheet</text>
    <rect x="255" y="260" width="220" height="22" rx="4" fill="#145a32"/><text x="365" y="275" text-anchor="middle">DrawViewImage · DrawViewDraft</text>
    <rect x="45" y="290" width="430" height="14" rx="3" fill="none" stroke="#2ecc71" stroke-width="0.5"/>
    <text x="260" y="301" text-anchor="middle" fill="#a9dfbf" font-size="9">HLR (Hidden Line Removal) via OCC HLRBRep for 3D→2D projection</text>
  </g>

  <!-- Dimensions & Annotations -->
  <rect x="510" y="160" width="460" height="155" rx="8" fill="#b9770e" opacity="0.85" filter="url(#s)"/>
  <text x="740" y="185" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📏 Dimensions &amp; Annotations</text>
  <g font-size="10" fill="#fdebd0">
    <rect x="525" y="200" width="200" height="22" rx="4" fill="#7e5109"/><text x="625" y="215" text-anchor="middle">DrawViewDimension</text>
    <rect x="735" y="200" width="220" height="22" rx="4" fill="#7e5109"/><text x="845" y="215" text-anchor="middle">DrawViewBalloon (BOM refs)</text>
    <rect x="525" y="230" width="200" height="22" rx="4" fill="#7e5109"/><text x="625" y="245" text-anchor="middle">DrawRichAnno (rich text)</text>
    <rect x="735" y="230" width="220" height="22" rx="4" fill="#7e5109"/><text x="845" y="245" text-anchor="middle">DrawLeaderLine (callouts)</text>
    <rect x="525" y="260" width="200" height="22" rx="4" fill="#7e5109"/><text x="625" y="275" text-anchor="middle">DrawViewSymbol (SVG)</text>
    <rect x="735" y="260" width="220" height="22" rx="4" fill="#7e5109"/><text x="845" y="275" text-anchor="middle">CosmeticEdge · CosmeticVertex</text>
    <rect x="525" y="290" width="430" height="14" rx="3" fill="none" stroke="#f39c12" stroke-width="0.5"/>
    <text x="740" y="301" text-anchor="middle" fill="#fad7a0" font-size="9">Geometric dimensioning (distances, angles, radii, diameters, areas)</text>
  </g>

  <!-- GD&T and Standards -->
  <rect x="30" y="330" width="460" height="100" rx="8" fill="#6c3483" opacity="0.8" filter="url(#s)"/>
  <text x="260" y="355" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📐 Standards &amp; GD&amp;T</text>
  <g font-size="10" fill="#e8daef">
    <rect x="45" y="370" width="200" height="22" rx="4" fill="#4a235a"/><text x="145" y="385" text-anchor="middle">ISO 128 / ANSI Y14.5</text>
    <rect x="255" y="370" width="220" height="22" rx="4" fill="#4a235a"/><text x="365" y="385" text-anchor="middle">1st / 3rd angle projection</text>
    <rect x="45" y="400" width="430" height="14" rx="2" fill="none" stroke="#9b59b6" stroke-width="0.5"/>
    <text x="260" y="411" text-anchor="middle" fill="#d2b4de" font-size="9">Welding symbols · Surface finish · Geometric tolerances · Title blocks</text>
  </g>

  <!-- Export -->
  <rect x="510" y="330" width="460" height="100" rx="8" fill="#922b21" opacity="0.8" filter="url(#s)"/>
  <text x="740" y="355" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📤 Export Formats</text>
  <g font-size="10" fill="#fadbd8">
    <rect x="525" y="370" width="100" height="22" rx="4" fill="#641e16"/><text x="575" y="385" text-anchor="middle">SVG</text>
    <rect x="635" y="370" width="100" height="22" rx="4" fill="#641e16"/><text x="685" y="385" text-anchor="middle">PDF</text>
    <rect x="745" y="370" width="100" height="22" rx="4" fill="#641e16"/><text x="795" y="385" text-anchor="middle">DXF</text>
    <rect x="855" y="370" width="100" height="22" rx="4" fill="#641e16"/><text x="905" y="385" text-anchor="middle">HPGL</text>
  </g>

  <!-- Pipeline -->
  <rect x="30" y="445" width="940" height="70" rx="8" fill="#1c2833" opacity="0.85"/>
  <text x="500" y="468" text-anchor="middle" fill="#ecf0f1" font-size="13" font-weight="bold">🔄 Projection Pipeline</text>
  <g font-size="11">
    <rect x="60" y="480" width="110" height="26" rx="5" fill="#3498db" opacity="0.8"/><text x="115" y="497" text-anchor="middle" fill="#fff">3D Shape</text>
    <text x="182" y="497" fill="#5dade2">→</text>
    <rect x="195" y="480" width="100" height="26" rx="5" fill="#2ecc71" opacity="0.8"/><text x="245" y="497" text-anchor="middle" fill="#fff">HLR</text>
    <text x="307" y="497" fill="#5dade2">→</text>
    <rect x="320" y="480" width="120" height="26" rx="5" fill="#e74c3c" opacity="0.8"/><text x="380" y="497" text-anchor="middle" fill="#fff">2D Edges</text>
    <text x="452" y="497" fill="#5dade2">→</text>
    <rect x="465" y="480" width="120" height="26" rx="5" fill="#f39c12" opacity="0.8"/><text x="525" y="497" text-anchor="middle" fill="#fff">Classify</text>
    <text x="597" y="497" fill="#5dade2">→</text>
    <rect x="610" y="480" width="110" height="26" rx="5" fill="#9b59b6" opacity="0.8"/><text x="665" y="497" text-anchor="middle" fill="#fff">Render SVG</text>
    <text x="732" y="497" fill="#5dade2">→</text>
    <rect x="745" y="480" width="100" height="26" rx="5" fill="#1abc9c" opacity="0.8"/><text x="795" y="497" text-anchor="middle" fill="#fff">DrawPage</text>
    <text x="857" y="497" fill="#5dade2">→</text>
    <rect x="870" y="480" width="90" height="26" rx="5" fill="#e67e22" opacity="0.8"/><text x="915" y="497" text-anchor="middle" fill="#fff">Export</text>
  </g>

  <!-- Timeline -->
  <rect x="30" y="530" width="940" height="105" rx="8" fill="#1c2833" opacity="0.6"/>
  <text x="500" y="555" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 TechDraw Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="580" x2="920" y2="580" stroke="#34495e" stroke-width="2"/>
    <circle cx="80" cy="580" r="4" fill="#e74c3c"/><text x="80" y="600" text-anchor="middle">2016 Created</text>
    <text x="80" y="613" text-anchor="middle" fill="#bdc3c7">replaces Drawing</text>
    <circle cx="250" cy="580" r="4" fill="#e67e22"/><text x="250" y="600" text-anchor="middle">2018 Sections</text>
    <circle cx="420" cy="580" r="4" fill="#f1c40f"/><text x="420" y="600" text-anchor="middle">2019 GD&amp;T</text>
    <circle cx="590" cy="580" r="4" fill="#2ecc71"/><text x="590" y="600" text-anchor="middle">2020 Detail views</text>
    <circle cx="760" cy="580" r="4" fill="#3498db"/><text x="760" y="600" text-anchor="middle">2023 TNP refs</text>
    <circle cx="900" cy="580" r="4" fill="#9b59b6"/><text x="900" y="600" text-anchor="middle">2025 Cosmetic</text>
  </g>
</svg>
