<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b9770e"/><stop offset="100%" stop-color="#f39c12"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="700" fill="url(#bg)" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">Gui Module Architecture (FreeCADGui)</text>
  <text x="500" y="55" text-anchor="middle" fill="#8b949e" font-size="12">365 .cpp · 347 .h · Full GUI framework — 3D viewer, commands, workbenches, selection</text>

  <!-- 3D Viewer -->
  <rect x="30" y="75" width="310" height="155" rx="8" fill="url(#gold)" opacity="0.9" filter="url(#s)"/>
  <text x="185" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🖥️ 3D Viewer</text>
  <g font-size="10" fill="#fef9e7">
    <rect x="45" y="112" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="112" y="128" text-anchor="middle">View3DInventor</text>
    <rect x="190" y="112" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="257" y="128" text-anchor="middle">View3DInventorViewer</text>
    <rect x="45" y="144" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="112" y="160" text-anchor="middle">SoFCDB (Coin3D)</text>
    <rect x="190" y="144" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="257" y="160" text-anchor="middle">NaviCube</text>
    <rect x="45" y="176" width="280" height="24" rx="4" fill="#7e5109"/>
    <text x="185" y="192" text-anchor="middle">SoFCSelection · SoFCUnifiedSelection · Clipping</text>
  </g>

  <!-- Navigation -->
  <rect x="355" y="75" width="290" height="155" rx="8" fill="#1a5276" opacity="0.85" filter="url(#s)"/>
  <text x="500" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🧭 Navigation</text>
  <g font-size="10" fill="#d6eaf8">
    <rect x="370" y="112" width="260" height="24" rx="4" fill="#0e2f44"/>
    <text x="500" y="128" text-anchor="middle">NavigationStyle (base class)</text>
    <rect x="370" y="144" width="125" height="24" rx="4" fill="#0e2f44"/>
    <text x="432" y="160" text-anchor="middle">CADNavigation</text>
    <rect x="505" y="144" width="125" height="24" rx="4" fill="#0e2f44"/>
    <text x="567" y="160" text-anchor="middle">BlenderNavigation</text>
    <rect x="370" y="176" width="125" height="24" rx="4" fill="#0e2f44"/>
    <text x="432" y="192" text-anchor="middle">GestureNavigation</text>
    <rect x="505" y="176" width="125" height="24" rx="4" fill="#0e2f44"/>
    <text x="567" y="192" text-anchor="middle">OpenInventor</text>
  </g>

  <!-- Command System -->
  <rect x="660" y="75" width="310" height="155" rx="8" fill="#1e8449" opacity="0.85" filter="url(#s)"/>
  <text x="815" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⌨️ Command System</text>
  <g font-size="10" fill="#d5f5e3">
    <rect x="675" y="112" width="135" height="24" rx="4" fill="#145a32"/>
    <text x="742" y="128" text-anchor="middle">Command</text>
    <rect x="820" y="112" width="135" height="24" rx="4" fill="#145a32"/>
    <text x="887" y="128" text-anchor="middle">CommandManager</text>
    <rect x="675" y="144" width="135" height="24" rx="4" fill="#145a32"/>
    <text x="742" y="160" text-anchor="middle">MacroCommand</text>
    <rect x="820" y="144" width="135" height="24" rx="4" fill="#145a32"/>
    <text x="887" y="160" text-anchor="middle">PythonCommand</text>
    <rect x="675" y="176" width="280" height="24" rx="4" fill="#145a32"/>
    <text x="815" y="192" text-anchor="middle">Action · MenuManager · ToolBarManager</text>
  </g>

  <!-- Selection Framework -->
  <rect x="30" y="250" width="310" height="130" rx="8" fill="#922b21" opacity="0.85" filter="url(#s)"/>
  <text x="185" y="275" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🎯 Selection</text>
  <g font-size="10" fill="#fadbd8">
    <rect x="45" y="290" width="135" height="24" rx="4" fill="#641e16"/>
    <text x="112" y="306" text-anchor="middle">SelectionSingleton</text>
    <rect x="190" y="290" width="135" height="24" rx="4" fill="#641e16"/>
    <text x="257" y="306" text-anchor="middle">SelectionFilter</text>
    <rect x="45" y="322" width="135" height="24" rx="4" fill="#641e16"/>
    <text x="112" y="338" text-anchor="middle">SelectionObserver</text>
    <rect x="190" y="322" width="135" height="24" rx="4" fill="#641e16"/>
    <text x="257" y="338" text-anchor="middle">SelectionGate</text>
    <rect x="45" y="354" width="280" height="18" rx="3" fill="none" stroke="#e74c3c" stroke-width="0.5"/>
    <text x="185" y="367" text-anchor="middle" fill="#f5b7b1" font-size="9">Pre-selection (hover) + Selection (click) + Sub-element</text>
  </g>

  <!-- View Providers -->
  <rect x="355" y="250" width="290" height="130" rx="8" fill="#6c3483" opacity="0.8" filter="url(#s)"/>
  <text x="500" y="275" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">👁️ ViewProviders</text>
  <g font-size="10" fill="#e8daef">
    <rect x="370" y="290" width="260" height="24" rx="4" fill="#4a235a"/>
    <text x="500" y="306" text-anchor="middle">ViewProvider (base)</text>
    <rect x="370" y="322" width="260" height="24" rx="4" fill="#4a235a"/>
    <text x="500" y="338" text-anchor="middle">ViewProviderDocumentObject</text>
    <rect x="370" y="354" width="260" height="18" rx="3" fill="none" stroke="#9b59b6" stroke-width="0.5"/>
    <text x="500" y="367" text-anchor="middle" fill="#d2b4de" font-size="9">VP*Link · VP*Geo · VP*Annotation · VP*Python</text>
  </g>

  <!-- Workbench System -->
  <rect x="660" y="250" width="310" height="130" rx="8" fill="#b9770e" opacity="0.8" filter="url(#s)"/>
  <text x="815" y="275" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔨 Workbenches</text>
  <g font-size="10" fill="#fdebd0">
    <rect x="675" y="290" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="742" y="306" text-anchor="middle">Workbench</text>
    <rect x="820" y="290" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="887" y="306" text-anchor="middle">PythonWorkbench</text>
    <rect x="675" y="322" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="742" y="338" text-anchor="middle">WorkbenchManager</text>
    <rect x="820" y="322" width="135" height="24" rx="4" fill="#7e5109"/>
    <text x="887" y="338" text-anchor="middle">StdWorkbench</text>
    <rect x="675" y="354" width="280" height="18" rx="3" fill="none" stroke="#f39c12" stroke-width="0.5"/>
    <text x="815" y="367" text-anchor="middle" fill="#fad7a0" font-size="9">Each module registers its Workbench in InitGui.py</text>
  </g>

  <!-- UI Components -->
  <rect x="30" y="400" width="460" height="120" rx="8" fill="#2c3e50" opacity="0.85" filter="url(#s)"/>
  <text x="260" y="425" text-anchor="middle" fill="#ecf0f1" font-size="14" font-weight="bold">🖼️ UI Components</text>
  <g font-size="10" fill="#bdc3c7">
    <text x="50" y="448">MainWindow · MDIView · DockWindow · TaskView · PropertyEditor</text>
    <text x="50" y="468">Tree · DAGView · PythonConsole · ReportView · DlgPreferences</text>
    <text x="50" y="488">OverlayManager · SplashScreen · ProgressBar · WaitCursor · Thumbnail</text>
    <text x="50" y="508">QSint (ribbon widgets) · Quarter (Qt+Coin3D bridge)</text>
  </g>

  <!-- Inventor/Coin3D -->
  <rect x="510" y="400" width="460" height="120" rx="8" fill="#2c3e50" opacity="0.85" filter="url(#s)"/>
  <text x="740" y="425" text-anchor="middle" fill="#ecf0f1" font-size="14" font-weight="bold">🎨 Coin3D / Inventor Layer</text>
  <g font-size="10" fill="#bdc3c7">
    <text x="530" y="448">SoFCDB · SoFCSelection · SoFCUnifiedSelection</text>
    <text x="530" y="468">SoFCBoundingBox · SoFCColorBar · SoFCColorGradient</text>
    <text x="530" y="488">SoNavigationDragger · SoAxisCrossKit · SoTextLabel</text>
    <text x="530" y="508">SoAutoZoomTranslation · SoDrawingGrid · SoShapeScale</text>
  </g>

  <!-- Connections -->
  <rect x="30" y="540" width="940" height="60" rx="8" fill="#1c2833" opacity="0.8"/>
  <text x="500" y="562" text-anchor="middle" fill="#aeb6bf" font-size="13" font-weight="bold">🔄 Module Communication Pattern</text>
  <text x="500" y="585" text-anchor="middle" fill="#7f8c8d" font-size="11">Workbench ◀──activates──▶ Commands ◀──triggers──▶ ViewProviders ◀──renders──▶ 3D Viewer ◀──fires──▶ Selection</text>

  <!-- History -->
  <rect x="30" y="615" width="940" height="70" rx="8" fill="#1c2833" opacity="0.6"/>
  <text x="500" y="638" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 Gui Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="655" x2="920" y2="655" stroke="#34495e" stroke-width="2"/>
    <circle cx="80" cy="655" r="4" fill="#e74c3c"/><text x="80" y="675" text-anchor="middle">2002 Init</text>
    <circle cx="230" cy="655" r="4" fill="#f39c12"/><text x="230" y="675" text-anchor="middle">2012 NaviCube</text>
    <circle cx="380" cy="655" r="4" fill="#2ecc71"/><text x="380" y="675" text-anchor="middle">2018 Overlay</text>
    <circle cx="530" cy="655" r="4" fill="#3498db"/><text x="530" y="675" text-anchor="middle">2020 DAGView</text>
    <circle cx="680" cy="655" r="4" fill="#9b59b6"/><text x="680" y="675" text-anchor="middle">2023 TNP Sel</text>
    <circle cx="830" cy="655" r="4" fill="#1abc9c"/><text x="830" y="675" text-anchor="middle">2025 Qt6 Port</text>
  </g>
</svg>
