<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="10"/>
  <text x="450" y="30" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Draft Module Architecture</text>
  <text x="450" y="48" text-anchor="middle" fill="#8b949e" font-size="11">2D drafting, annotation, DXF/DWG, and precision snapping</text>

  <!-- Objects -->
  <rect x="30" y="65" width="250" height="130" rx="8" fill="#3498db" opacity="0.8" filter="url(#s)"/>
  <text x="155" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2D Objects</text>
  <g font-size="9" fill="#d6eaf8">
    <text x="45" y="108">Line, Wire, Circle, Arc</text>
    <text x="45" y="123">Rectangle, Polygon, Ellipse</text>
    <text x="45" y="138">BSpline, BezCurve</text>
    <text x="45" y="153">Dimension, Label, Text</text>
    <text x="45" y="168">DrawingView, Shape2DView</text>
    <text x="45" y="183">Facebinder, ShapeString</text>
  </g>

  <!-- Snap -->
  <rect x="300" y="65" width="250" height="130" rx="8" fill="#2ecc71" opacity="0.8" filter="url(#s)"/>
  <text x="425" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Snap System</text>
  <g font-size="9" fill="#d5f5e3">
    <text x="315" y="108">Endpoint, Midpoint, Center</text>
    <text x="315" y="123">Intersection, Perpendicular</text>
    <text x="315" y="138">Extension, Parallel, Angle</text>
    <text x="315" y="153">Grid, WorkingPlane</text>
    <text x="315" y="168">Near, Ortho, Special</text>
    <text x="315" y="183">15+ snap modes</text>
  </g>

  <!-- Arrays -->
  <rect x="570" y="65" width="300" height="130" rx="8" fill="#f39c12" opacity="0.8" filter="url(#s)"/>
  <text x="720" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Arrays & Modifiers</text>
  <g font-size="9" fill="#fdebd0">
    <text x="585" y="108">OrthoArray — rectangular grid</text>
    <text x="585" y="123">PolarArray — around axis</text>
    <text x="585" y="138">CircularArray — concentric</text>
    <text x="585" y="153">PathArray — along path</text>
    <text x="585" y="168">Clone, Mirror, Offset</text>
    <text x="585" y="183">Upgrade / Downgrade</text>
  </g>

  <!-- I/O -->
  <rect x="30" y="215" width="400" height="80" rx="8" fill="#9b59b6" opacity="0.8" filter="url(#s)"/>
  <text x="230" y="238" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Import/Export</text>
  <g font-size="9" fill="#e8daef">
    <text x="45" y="258">DXF — Drawing Exchange Format (ezdxf)</text>
    <text x="45" y="273">DWG — AutoCAD (via LibreDWG/ODA)</text>
    <text x="45" y="288">SVG, OCA, Airfoil DAT</text>
  </g>

  <!-- WorkingPlane -->
  <rect x="450" y="215" width="420" height="80" rx="8" fill="#e74c3c" opacity="0.8" filter="url(#s)"/>
  <text x="660" y="238" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Working Plane</text>
  <g font-size="9" fill="#fadbd8">
    <text x="465" y="258">XY / XZ / YZ / Custom planes</text>
    <text x="465" y="273">Auto-detect from selection</text>
    <text x="465" y="288">Grid overlay with configurable spacing</text>
  </g>

  <!-- Timeline -->
  <rect x="30" y="315" width="840" height="90" rx="8" fill="#1c2833" opacity="0.7"/>
  <text x="450" y="338" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="360" x2="820" y2="360" stroke="#34495e" stroke-width="2"/>
    <circle cx="120" cy="360" r="4" fill="#3498db"/><text x="120" y="380" text-anchor="middle">2009</text><text x="120" y="393" text-anchor="middle" fill="#bdc3c7">Original</text>
    <circle cx="320" cy="360" r="4" fill="#2ecc71"/><text x="320" y="380" text-anchor="middle">2015</text><text x="320" y="393" text-anchor="middle" fill="#bdc3c7">Snap rewrite</text>
    <circle cx="520" cy="360" r="4" fill="#f39c12"/><text x="520" y="380" text-anchor="middle">2020</text><text x="520" y="393" text-anchor="middle" fill="#bdc3c7">Array objects</text>
    <circle cx="720" cy="360" r="4" fill="#9b59b6"/><text x="720" y="380" text-anchor="middle">2024</text><text x="720" y="393" text-anchor="middle" fill="#bdc3c7">ezdxf native</text>
  </g>
</svg>
