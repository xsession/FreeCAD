<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="10"/>
  <text x="450" y="30" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">BIM Module Architecture</text>
  <text x="450" y="48" text-anchor="middle" fill="#8b949e" font-size="11">Building Information Modeling with native IFC integration</text>

  <!-- Building Hierarchy -->
  <rect x="30" y="65" width="260" height="140" rx="8" fill="#3498db" opacity="0.8" filter="url(#s)"/>
  <text x="160" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Building Hierarchy</text>
  <g font-size="9" fill="#d6eaf8">
    <text x="45" y="108">Project (IfcProject)</text>
    <text x="55" y="123">└─ Site (IfcSite)</text>
    <text x="65" y="138">   └─ Building (IfcBuilding)</text>
    <text x="75" y="153">      └─ Floor (IfcBuildingStorey)</text>
    <text x="85" y="168">         └─ Walls, Windows, etc.</text>
    <text x="45" y="193">SectionPlane, 2D output</text>
  </g>

  <!-- Architectural Objects -->
  <rect x="310" y="65" width="260" height="140" rx="8" fill="#2ecc71" opacity="0.8" filter="url(#s)"/>
  <text x="440" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Architectural Objects</text>
  <g font-size="9" fill="#d5f5e3">
    <text x="325" y="108">Wall — multi-layer, curved</text>
    <text x="325" y="123">Window / Door — parametric</text>
    <text x="325" y="128"> </text>
    <text x="325" y="138">Column, Beam, Slab</text>
    <text x="325" y="153">Roof, Stairs, Rebar</text>
    <text x="325" y="168">Pipe, Connector</text>
    <text x="325" y="183">Panel, Frame, Curtain Wall</text>
    <text x="325" y="193">Space, Equipment</text>
  </g>

  <!-- IFC -->
  <rect x="590" y="65" width="280" height="140" rx="8" fill="#f39c12" opacity="0.8" filter="url(#s)"/>
  <text x="730" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">NativeIFC Engine</text>
  <g font-size="9" fill="#fdebd0">
    <text x="605" y="108">ifcopenshell — IFC kernel</text>
    <text x="605" y="123">ifc_tools.py — bidirectional sync</text>
    <text x="605" y="138">IFC4/IFC2x3 schema support</text>
    <text x="605" y="153">Direct .ifc read/write</text>
    <text x="605" y="168">Property sets, materials</text>
    <text x="605" y="183">Quantities, classifications</text>
    <text x="605" y="193">IfcOpenShell geometry</text>
  </g>

  <!-- Tools -->
  <rect x="30" y="225" width="840" height="70" rx="8" fill="#2c3e50" opacity="0.85" filter="url(#s)"/>
  <text x="450" y="248" text-anchor="middle" fill="#ecf0f1" font-size="13" font-weight="bold">🔧 BIM Workflow Tools</text>
  <g font-size="10" fill="#bdc3c7">
    <text x="50" y="270">Setup Wizard</text><text x="160" y="270">•</text>
    <text x="170" y="270">Material Assignment</text><text x="310" y="270">•</text>
    <text x="320" y="270">Schedule/BOM</text><text x="420" y="270">•</text>
    <text x="430" y="270">Clash Detection</text><text x="550" y="270">•</text>
    <text x="560" y="270">IFC Diff/Merge</text><text x="670" y="270">•</text>
    <text x="680" y="270">Preflight Check</text>
  </g>

  <!-- Timeline -->
  <rect x="30" y="315" width="840" height="90" rx="8" fill="#1c2833" opacity="0.7"/>
  <text x="450" y="338" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="358" x2="820" y2="358" stroke="#34495e" stroke-width="2"/>
    <circle cx="120" cy="358" r="4" fill="#3498db"/><text x="120" y="378" text-anchor="middle">2011</text><text x="120" y="391" text-anchor="middle" fill="#bdc3c7">Arch WB</text>
    <circle cx="300" cy="358" r="4" fill="#2ecc71"/><text x="300" y="378" text-anchor="middle">2018</text><text x="300" y="391" text-anchor="middle" fill="#bdc3c7">BIM WB</text>
    <circle cx="500" cy="358" r="4" fill="#f39c12"/><text x="500" y="378" text-anchor="middle">2023</text><text x="500" y="391" text-anchor="middle" fill="#bdc3c7">Arch→BIM merge</text>
    <circle cx="700" cy="358" r="4" fill="#e74c3c"/><text x="700" y="378" text-anchor="middle">2024</text><text x="700" y="391" text-anchor="middle" fill="#bdc3c7">NativeIFC</text>
  </g>
</svg>
