<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="660" fill="url(#bg)" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">CAM Module — Computer-Aided Manufacturing</text>
  <text x="500" y="55" text-anchor="middle" fill="#8b949e" font-size="12">76 .cpp · 59 .h · 379 .py — Toolpath generation &amp; G-code post-processing</text>

  <!-- Path core -->
  <rect x="30" y="75" width="940" height="70" rx="8" fill="#1a5276" opacity="0.9" filter="url(#s)"/>
  <text x="500" y="100" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🔧 CAM Job — Machining Container</text>
  <text x="500" y="120" text-anchor="middle" fill="#85c1e9" font-size="11">Job → Stock → Operations → Tools → Post-Processor → G-code output</text>

  <!-- Operations -->
  <rect x="30" y="160" width="460" height="165" rx="8" fill="#1e8449" opacity="0.85" filter="url(#s)"/>
  <text x="260" y="185" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⚙️ Machining Operations</text>
  <g font-size="10" fill="#d5f5e3">
    <rect x="45" y="200" width="200" height="22" rx="4" fill="#145a32"/><text x="145" y="215" text-anchor="middle">Profile (contour)</text>
    <rect x="255" y="200" width="220" height="22" rx="4" fill="#145a32"/><text x="365" y="215" text-anchor="middle">Pocket (area clearing)</text>
    <rect x="45" y="230" width="200" height="22" rx="4" fill="#145a32"/><text x="145" y="245" text-anchor="middle">Drilling (hole cycles)</text>
    <rect x="255" y="230" width="220" height="22" rx="4" fill="#145a32"/><text x="365" y="245" text-anchor="middle">Surface (3D surfacing)</text>
    <rect x="45" y="260" width="200" height="22" rx="4" fill="#145a32"/><text x="145" y="275" text-anchor="middle">Engrave (V-carve)</text>
    <rect x="255" y="260" width="220" height="22" rx="4" fill="#145a32"/><text x="365" y="275" text-anchor="middle">Adaptive (HSM clearing)</text>
    <rect x="45" y="290" width="430" height="22" rx="4" fill="#145a32"/><text x="260" y="305" text-anchor="middle">Waterline · Slot · Deburr · Thread Milling · Helix</text>
  </g>

  <!-- Tooling -->
  <rect x="510" y="160" width="460" height="165" rx="8" fill="#b9770e" opacity="0.85" filter="url(#s)"/>
  <text x="740" y="185" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔩 Tooling &amp; Post-Processors</text>
  <g font-size="10" fill="#fdebd0">
    <rect x="525" y="200" width="200" height="22" rx="4" fill="#7e5109"/><text x="625" y="215" text-anchor="middle">ToolBit (shape definition)</text>
    <rect x="735" y="200" width="220" height="22" rx="4" fill="#7e5109"/><text x="845" y="215" text-anchor="middle">ToolController (feeds/speeds)</text>
    <rect x="525" y="230" width="200" height="22" rx="4" fill="#7e5109"/><text x="625" y="245" text-anchor="middle">ToolLibrary (tool DB)</text>
    <rect x="735" y="230" width="220" height="22" rx="4" fill="#7e5109"/><text x="845" y="245" text-anchor="middle">Stock (raw material)</text>
    <rect x="525" y="260" width="430" height="22" rx="4" fill="#7e5109"/><text x="740" y="275" text-anchor="middle">Post-Processors: grbl · linuxcnc · mach3 · centroid</text>
    <rect x="525" y="290" width="430" height="22" rx="4" fill="#7e5109"/><text x="740" y="305" text-anchor="middle">Path::Command (G0/G1/G2/G3) · Voronoi · libarea</text>
  </g>

  <!-- C++ Core -->
  <rect x="30" y="340" width="460" height="100" rx="8" fill="#922b21" opacity="0.8" filter="url(#s)"/>
  <text x="260" y="365" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">💻 C++ Core (libPath)</text>
  <g font-size="10" fill="#fadbd8">
    <rect x="45" y="380" width="200" height="22" rx="4" fill="#641e16"/><text x="145" y="395" text-anchor="middle">Path::Command (G-code)</text>
    <rect x="255" y="380" width="220" height="22" rx="4" fill="#641e16"/><text x="365" y="395" text-anchor="middle">FeaturePath · FeatureArea</text>
    <rect x="45" y="410" width="430" height="14" rx="2" fill="none" stroke="#e74c3c" stroke-width="0.5"/>
    <text x="260" y="421" text-anchor="middle" fill="#f5b7b1" font-size="9">Voronoi diagram · libarea (offset/pocket) · PathSimulator</text>
  </g>

  <!-- Simulator -->
  <rect x="510" y="340" width="460" height="100" rx="8" fill="#6c3483" opacity="0.8" filter="url(#s)"/>
  <text x="740" y="365" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🎮 Path Simulator</text>
  <g font-size="10" fill="#e8daef">
    <rect x="525" y="380" width="210" height="22" rx="4" fill="#4a235a"/><text x="630" y="395" text-anchor="middle">3D material removal preview</text>
    <rect x="745" y="380" width="210" height="22" rx="4" fill="#4a235a"/><text x="850" y="395" text-anchor="middle">Step-through playback</text>
    <rect x="525" y="410" width="430" height="14" rx="2" fill="none" stroke="#9b59b6" stroke-width="0.5"/>
    <text x="740" y="421" text-anchor="middle" fill="#d2b4de" font-size="9">Visualize toolpath execution on stock before sending to CNC</text>
  </g>

  <!-- Workflow -->
  <rect x="30" y="455" width="940" height="70" rx="8" fill="#1c2833" opacity="0.85"/>
  <text x="500" y="478" text-anchor="middle" fill="#ecf0f1" font-size="13" font-weight="bold">🔄 CAM Workflow</text>
  <g font-size="11">
    <rect x="55" y="490" width="90" height="26" rx="5" fill="#3498db" opacity="0.8"/><text x="100" y="507" text-anchor="middle" fill="#fff">3D Model</text>
    <text x="155" y="507" fill="#5dade2">→</text>
    <rect x="165" y="490" width="80" height="26" rx="5" fill="#2ecc71" opacity="0.8"/><text x="205" y="507" text-anchor="middle" fill="#fff">Job</text>
    <text x="255" y="507" fill="#5dade2">→</text>
    <rect x="265" y="490" width="80" height="26" rx="5" fill="#e74c3c" opacity="0.8"/><text x="305" y="507" text-anchor="middle" fill="#fff">Stock</text>
    <text x="355" y="507" fill="#5dade2">→</text>
    <rect x="365" y="490" width="80" height="26" rx="5" fill="#f39c12" opacity="0.8"/><text x="405" y="507" text-anchor="middle" fill="#fff">Tools</text>
    <text x="455" y="507" fill="#5dade2">→</text>
    <rect x="465" y="490" width="110" height="26" rx="5" fill="#9b59b6" opacity="0.8"/><text x="520" y="507" text-anchor="middle" fill="#fff">Operations</text>
    <text x="585" y="507" fill="#5dade2">→</text>
    <rect x="595" y="490" width="100" height="26" rx="5" fill="#1abc9c" opacity="0.8"/><text x="645" y="507" text-anchor="middle" fill="#fff">Simulate</text>
    <text x="705" y="507" fill="#5dade2">→</text>
    <rect x="715" y="490" width="100" height="26" rx="5" fill="#e67e22" opacity="0.8"/><text x="765" y="507" text-anchor="middle" fill="#fff">Post-Proc</text>
    <text x="825" y="507" fill="#5dade2">→</text>
    <rect x="835" y="490" width="120" height="26" rx="5" fill="#2c3e50" opacity="0.9"/><text x="895" y="507" text-anchor="middle" fill="#fff">G-code File</text>
  </g>

  <!-- Timeline -->
  <rect x="30" y="540" width="940" height="105" rx="8" fill="#1c2833" opacity="0.6"/>
  <text x="500" y="565" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 CAM Module Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="590" x2="920" y2="590" stroke="#34495e" stroke-width="2"/>
    <circle cx="80" cy="590" r="4" fill="#e74c3c"/><text x="80" y="610" text-anchor="middle">2014 Path WB</text>
    <circle cx="230" cy="590" r="4" fill="#e67e22"/><text x="230" y="610" text-anchor="middle">2016 Operations</text>
    <circle cx="380" cy="590" r="4" fill="#f1c40f"/><text x="380" y="610" text-anchor="middle">2018 ToolBit</text>
    <circle cx="530" cy="590" r="4" fill="#2ecc71"/><text x="530" y="610" text-anchor="middle">2020 Adaptive</text>
    <circle cx="680" cy="590" r="4" fill="#3498db"/><text x="680" y="610" text-anchor="middle">2022 Renamed</text>
    <text x="680" y="625" text-anchor="middle" fill="#bdc3c7">Path→CAM</text>
    <circle cx="830" cy="590" r="4" fill="#9b59b6"/><text x="830" y="610" text-anchor="middle">2025 Simulator</text>
  </g>
</svg>
