<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="680" fill="url(#bg)" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">FEM Module — Finite Element Analysis</text>
  <text x="500" y="55" text-anchor="middle" fill="#8b949e" font-size="12">135 .cpp · 126 .h · 389 .py — Multi-solver analysis framework</text>

  <!-- Analysis container -->
  <rect x="30" y="75" width="940" height="75" rx="8" fill="#1a5276" opacity="0.9" filter="url(#s)"/>
  <text x="500" y="100" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">📊 FemAnalysis — Analysis Container</text>
  <text x="500" y="120" text-anchor="middle" fill="#85c1e9" font-size="11">Contains: Mesh + Materials + Constraints (loads/BCs) + Solver → Results</text>
  <text x="500" y="138" text-anchor="middle" fill="#5dade2" font-size="10">Orchestrates the complete FEA workflow from geometry to post-processing</text>

  <!-- Mesh -->
  <rect x="30" y="165" width="310" height="135" rx="8" fill="#1e8449" opacity="0.85" filter="url(#s)"/>
  <text x="185" y="190" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔺 Meshing</text>
  <g font-size="10" fill="#d5f5e3">
    <rect x="45" y="202" width="130" height="24" rx="4" fill="#145a32"/><text x="110" y="218" text-anchor="middle">FemMesh</text>
    <rect x="185" y="202" width="140" height="24" rx="4" fill="#145a32"/><text x="255" y="218" text-anchor="middle">Gmsh (external)</text>
    <rect x="45" y="234" width="130" height="24" rx="4" fill="#145a32"/><text x="110" y="250" text-anchor="middle">Netgen (built-in)</text>
    <rect x="185" y="234" width="140" height="24" rx="4" fill="#145a32"/><text x="255" y="250" text-anchor="middle">SMESH (Salome)</text>
    <rect x="45" y="266" width="280" height="18" rx="3" fill="none" stroke="#2ecc71" stroke-width="0.5"/>
    <text x="185" y="279" text-anchor="middle" fill="#a9dfbf" font-size="9">Tet4/Tet10 · Hex8/Hex20 · Tri3/Tri6 · Quad4/Quad8</text>
  </g>

  <!-- Constraints -->
  <rect x="355" y="165" width="290" height="135" rx="8" fill="#922b21" opacity="0.85" filter="url(#s)"/>
  <text x="500" y="190" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⚡ Constraints (Loads &amp; BCs)</text>
  <g font-size="10" fill="#fadbd8">
    <rect x="370" y="202" width="120" height="22" rx="4" fill="#641e16"/><text x="430" y="217" text-anchor="middle">Force</text>
    <rect x="500" y="202" width="120" height="22" rx="4" fill="#641e16"/><text x="560" y="217" text-anchor="middle">Pressure</text>
    <rect x="370" y="232" width="120" height="22" rx="4" fill="#641e16"/><text x="430" y="247" text-anchor="middle">FixedConstraint</text>
    <rect x="500" y="232" width="120" height="22" rx="4" fill="#641e16"/><text x="560" y="247" text-anchor="middle">Temperature</text>
    <rect x="370" y="262" width="250" height="22" rx="4" fill="#641e16"/><text x="495" y="277" text-anchor="middle">HeatFlux · Contact · Displacement</text>
  </g>

  <!-- Solvers -->
  <rect x="660" y="165" width="310" height="135" rx="8" fill="#b9770e" opacity="0.85" filter="url(#s)"/>
  <text x="815" y="190" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🧮 Solvers</text>
  <g font-size="10" fill="#fdebd0">
    <rect x="675" y="202" width="130" height="24" rx="4" fill="#7e5109"/><text x="740" y="218" text-anchor="middle">CalculiX (CCX)</text>
    <rect x="815" y="202" width="140" height="24" rx="4" fill="#7e5109"/><text x="885" y="218" text-anchor="middle">Elmer (multi-phys)</text>
    <rect x="675" y="234" width="130" height="24" rx="4" fill="#7e5109"/><text x="740" y="250" text-anchor="middle">Z88 (structural)</text>
    <rect x="815" y="234" width="140" height="24" rx="4" fill="#7e5109"/><text x="885" y="250" text-anchor="middle">OpenFOAM (CFD)</text>
    <rect x="675" y="266" width="280" height="18" rx="3" fill="none" stroke="#f39c12" stroke-width="0.5"/>
    <text x="815" y="279" text-anchor="middle" fill="#fad7a0" font-size="9">Input deck generation → External solver → Result import</text>
  </g>

  <!-- Post-Processing -->
  <rect x="30" y="315" width="460" height="120" rx="8" fill="#6c3483" opacity="0.8" filter="url(#s)"/>
  <text x="260" y="340" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📈 Post-Processing (VTK Pipeline)</text>
  <g font-size="10" fill="#e8daef">
    <rect x="45" y="355" width="200" height="24" rx="4" fill="#4a235a"/><text x="145" y="371" text-anchor="middle">FemPostPipeline</text>
    <rect x="255" y="355" width="220" height="24" rx="4" fill="#4a235a"/><text x="365" y="371" text-anchor="middle">FemPostFilter (clip/warp/cut)</text>
    <rect x="45" y="387" width="200" height="24" rx="4" fill="#4a235a"/><text x="145" y="403" text-anchor="middle">FemPostObject (result view)</text>
    <rect x="255" y="387" width="220" height="24" rx="4" fill="#4a235a"/><text x="365" y="403" text-anchor="middle">Color maps · Deformation · Vectors</text>
  </g>

  <!-- Materials -->
  <rect x="510" y="315" width="460" height="120" rx="8" fill="#1a5276" opacity="0.8" filter="url(#s)"/>
  <text x="740" y="340" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🧪 Materials &amp; Properties</text>
  <g font-size="10" fill="#d6eaf8">
    <rect x="525" y="355" width="210" height="24" rx="4" fill="#0e2f44"/><text x="630" y="371" text-anchor="middle">MaterialMechanical</text>
    <rect x="745" y="355" width="210" height="24" rx="4" fill="#0e2f44"/><text x="850" y="371" text-anchor="middle">MaterialFluid</text>
    <rect x="525" y="387" width="430" height="24" rx="4" fill="#0e2f44"/><text x="740" y="403" text-anchor="middle">Young's Modulus · Poisson · Density · Thermal Conductivity</text>
  </g>

  <!-- Workflow -->
  <rect x="30" y="450" width="940" height="85" rx="8" fill="#1c2833" opacity="0.85"/>
  <text x="500" y="475" text-anchor="middle" fill="#ecf0f1" font-size="14" font-weight="bold">🔄 FEM Workflow Pipeline</text>
  <g font-size="11">
    <rect x="50" y="490" width="120" height="32" rx="6" fill="#3498db" opacity="0.8"/><text x="110" y="510" text-anchor="middle" fill="#fff">Geometry</text>
    <text x="185" y="510" fill="#5dade2">→</text>
    <rect x="200" y="490" width="100" height="32" rx="6" fill="#2ecc71" opacity="0.8"/><text x="250" y="510" text-anchor="middle" fill="#fff">Mesh</text>
    <text x="315" y="510" fill="#5dade2">→</text>
    <rect x="330" y="490" width="120" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="390" y="510" text-anchor="middle" fill="#fff">Constraints</text>
    <text x="465" y="510" fill="#5dade2">→</text>
    <rect x="480" y="490" width="100" height="32" rx="6" fill="#f39c12" opacity="0.8"/><text x="530" y="510" text-anchor="middle" fill="#fff">Material</text>
    <text x="595" y="510" fill="#5dade2">→</text>
    <rect x="610" y="490" width="100" height="32" rx="6" fill="#9b59b6" opacity="0.8"/><text x="660" y="510" text-anchor="middle" fill="#fff">Solve</text>
    <text x="725" y="510" fill="#5dade2">→</text>
    <rect x="740" y="490" width="120" height="32" rx="6" fill="#1abc9c" opacity="0.8"/><text x="800" y="510" text-anchor="middle" fill="#fff">Post-Process</text>
    <text x="875" y="510" fill="#5dade2">→</text>
    <rect x="890" y="490" width="70" height="32" rx="6" fill="#e67e22" opacity="0.8"/><text x="925" y="510" text-anchor="middle" fill="#fff">Report</text>
  </g>

  <!-- Timeline -->
  <rect x="30" y="550" width="940" height="115" rx="8" fill="#1c2833" opacity="0.6"/>
  <text x="500" y="575" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 FEM Module Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="80" y1="600" x2="920" y2="600" stroke="#34495e" stroke-width="2"/>
    <circle cx="80" cy="600" r="4" fill="#e74c3c"/><text x="80" y="620" text-anchor="middle">2013 Initial</text>
    <text x="80" y="633" text-anchor="middle" fill="#bdc3c7">CalculiX</text>
    <circle cx="220" cy="600" r="4" fill="#e67e22"/><text x="220" y="620" text-anchor="middle">2015 Elmer</text>
    <circle cx="360" cy="600" r="4" fill="#f1c40f"/><text x="360" y="620" text-anchor="middle">2017 VTK post</text>
    <circle cx="500" cy="600" r="4" fill="#2ecc71"/><text x="500" y="620" text-anchor="middle">2018 OpenFOAM</text>
    <circle cx="640" cy="600" r="4" fill="#3498db"/><text x="640" y="620" text-anchor="middle">2020 Z88</text>
    <circle cx="780" cy="600" r="4" fill="#9b59b6"/><text x="780" y="620" text-anchor="middle">2023 Gmsh</text>
    <text x="780" y="633" text-anchor="middle" fill="#bdc3c7">integration</text>
    <circle cx="900" cy="600" r="4" fill="#1abc9c"/><text x="900" y="620" text-anchor="middle">2025 Pipeline</text>
  </g>
</svg>
