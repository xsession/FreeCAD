<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="900" height="380" fill="url(#bg)" rx="10"/>
  <text x="450" y="30" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Material Module Architecture</text>
  <text x="450" y="48" text-anchor="middle" fill="#8b949e" font-size="11">Material definition, management, and card-based library system</text>

  <rect x="30" y="65" width="250" height="120" rx="8" fill="#3498db" opacity="0.8" filter="url(#s)"/>
  <text x="155" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">MaterialManager</text>
  <g font-size="9" fill="#d6eaf8">
    <text x="45" y="108">Central material registry</text>
    <text x="45" y="123">UUID-based identification</text>
    <text x="45" y="138">Physical + appearance props</text>
    <text x="45" y="153">Library management</text>
    <text x="45" y="168">Filter by model type</text>
  </g>

  <rect x="300" y="65" width="270" height="120" rx="8" fill="#2ecc71" opacity="0.8" filter="url(#s)"/>
  <text x="435" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Material Card (YAML)</text>
  <g font-size="9" fill="#d5f5e3">
    <text x="315" y="108">General: Name, Description, UUID</text>
    <text x="315" y="123">Physical: Density, YoungsModulus</text>
    <text x="315" y="138">  PoissonRatio, ThermalExpansion</text>
    <text x="315" y="153">Appearance: DiffuseColor, Texture</text>
    <text x="315" y="168">500+ built-in cards</text>
  </g>

  <rect x="590" y="65" width="280" height="120" rx="8" fill="#f39c12" opacity="0.8" filter="url(#s)"/>
  <text x="730" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Material Models</text>
  <g font-size="9" fill="#fdebd0">
    <text x="605" y="108">LinearElastic — basic structural</text>
    <text x="605" y="123">Thermal — heat transfer</text>
    <text x="605" y="138">Fluid — CFD properties</text>
    <text x="605" y="153">Electromagnetic — EM simulation</text>
    <text x="605" y="168">Architectural — rendering</text>
  </g>

  <!-- UI -->
  <rect x="30" y="205" width="840" height="50" rx="8" fill="#2c3e50" opacity="0.85"/>
  <text x="450" y="225" text-anchor="middle" fill="#ecf0f1" font-size="12" font-weight="bold">🎨 Material Editor UI — Tree-based browser with search, filter by model, in-place editing, preview</text>
  <text x="450" y="243" text-anchor="middle" fill="#7f8c8d" font-size="10">Consumers: FEM (simulation properties), BIM (structural), Part/PartDesign (appearance), Render (textures)</text>

  <!-- Timeline -->
  <rect x="30" y="275" width="840" height="90" rx="8" fill="#1c2833" opacity="0.7"/>
  <text x="450" y="298" text-anchor="middle" fill="#aeb6bf" font-size="12" font-weight="bold">📅 Timeline</text>
  <g font-size="9" fill="#7f8c8d">
    <line x1="100" y1="320" x2="800" y2="320" stroke="#34495e" stroke-width="2"/>
    <circle cx="180" cy="320" r="4" fill="#3498db"/><text x="180" y="340" text-anchor="middle">2014</text><text x="180" y="353" text-anchor="middle" fill="#bdc3c7">Basic mat</text>
    <circle cx="380" cy="320" r="4" fill="#2ecc71"/><text x="380" y="340" text-anchor="middle">2022</text><text x="380" y="353" text-anchor="middle" fill="#bdc3c7">YAML cards</text>
    <circle cx="580" cy="320" r="4" fill="#f39c12"/><text x="580" y="340" text-anchor="middle">2023</text><text x="580" y="353" text-anchor="middle" fill="#bdc3c7">MaterialManager</text>
    <circle cx="730" cy="320" r="4" fill="#9b59b6"/><text x="730" y="340" text-anchor="middle">2024</text><text x="730" y="353" text-anchor="middle" fill="#bdc3c7">Model system</text>
  </g>
</svg>
