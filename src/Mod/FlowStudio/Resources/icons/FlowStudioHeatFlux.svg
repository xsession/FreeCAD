<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="hf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#hf)"/>
  <!-- Surface -->
  <rect x="10" y="30" width="44" height="4" rx="1" fill="#FFCCBC"/>
  <!-- Heat flux arrows pointing up from surface -->
  <line x1="16" y1="28" x2="16" y2="14" stroke="#FFF176" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="13,17 16,10 19,17" fill="#FFF176"/>
  <line x1="26" y1="28" x2="26" y2="14" stroke="#FFEE58" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="23,17 26,10 29,17" fill="#FFEE58"/>
  <line x1="36" y1="28" x2="36" y2="14" stroke="#FFF176" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="33,17 36,10 39,17" fill="#FFF176"/>
  <line x1="46" y1="28" x2="46" y2="14" stroke="#FFEE58" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="43,17 46,10 49,17" fill="#FFEE58"/>
  <!-- q" label -->
  <text x="32" y="50" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#FFCCBC" text-anchor="middle">q"</text>
</svg>
