<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="in" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#in)"/>
  <!-- Pipe opening -->
  <rect x="8" y="16" width="12" height="32" rx="2" fill="#1B5E20"/>
  <rect x="10" y="18" width="8" height="28" rx="1" fill="#4CAF50"/>
  <!-- Flow arrows pointing right (into domain) -->
  <line x1="24" y1="24" x2="44" y2="24" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="44,20 52,24 44,28" fill="#fff"/>
  <line x1="24" y1="32" x2="44" y2="32" stroke="#E8F5E9" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="44,28 52,32 44,36" fill="#E8F5E9"/>
  <line x1="24" y1="40" x2="44" y2="40" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="44,36 52,40 44,44" fill="#fff"/>
  <!-- IN label -->
  <text x="14" y="36" font-family="Arial,sans-serif" font-weight="bold" font-size="8" fill="#fff" text-anchor="middle">IN</text>
</svg>
