      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#tmp)"/>
