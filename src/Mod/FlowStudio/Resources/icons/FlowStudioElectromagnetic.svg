<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="em" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BA68C8"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#em)"/>
  <!-- Solenoid coil loops -->
  <ellipse cx="32" cy="20" rx="16" ry="6" fill="none" stroke="#E1BEE7" stroke-width="2"/>
  <ellipse cx="32" cy="28" rx="16" ry="6" fill="none" stroke="#CE93D8" stroke-width="2"/>
  <ellipse cx="32" cy="36" rx="16" ry="6" fill="none" stroke="#E1BEE7" stroke-width="2"/>
  <!-- Magnetic field arrow (B) -->
  <line x1="32" y1="44" x2="32" y2="52" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="28,50 32,56 36,50" fill="#fff"/>
  <text x="42" y="54" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#E1BEE7">B</text>
  <!-- Plus badge -->
  <circle cx="50" cy="50" r="10" fill="#4CAF50"/>
  <rect x="47" y="44" width="6" height="12" rx="1" fill="#fff"/>
  <rect x="44" y="47" width="12" height="6" rx="1" fill="#fff"/>
</svg>
