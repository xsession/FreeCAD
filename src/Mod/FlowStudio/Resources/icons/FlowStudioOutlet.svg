<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="out" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#out)"/>
  <!-- Flow arrows pointing right (out of domain) -->
  <line x1="12" y1="24" x2="32" y2="24" stroke="#FFCDD2" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="32,20 40,24 32,28" fill="#FFCDD2"/>
  <line x1="12" y1="32" x2="32" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="32,28 40,32 32,36" fill="#fff"/>
  <line x1="12" y1="40" x2="32" y2="40" stroke="#FFCDD2" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="32,36 40,40 32,44" fill="#FFCDD2"/>
  <!-- Pipe opening on right -->
  <rect x="44" y="16" width="12" height="32" rx="2" fill="#7F0000"/>
  <rect x="46" y="18" width="8" height="28" rx="1" fill="#C62828"/>
  <!-- OUT label -->
  <text x="50" y="36" font-family="Arial,sans-serif" font-weight="bold" font-size="7" fill="#fff" text-anchor="middle">OUT</text>
</svg>
