<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#ic)"/>
  <!-- "t=0" concept: clock at zero -->
  <circle cx="32" cy="30" r="14" fill="none" stroke="#E3F2FD" stroke-width="2.5"/>
  <circle cx="32" cy="30" r="2" fill="#fff"/>
  <!-- Clock hands at 12 o'clock -->
  <line x1="32" y1="30" x2="32" y2="19" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="30" x2="38" y2="25" stroke="#E3F2FD" stroke-width="2" stroke-linecap="round"/>
  <!-- t=0 label -->
  <text x="32" y="54" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#E3F2FD" text-anchor="middle">t=0</text>
</svg>
