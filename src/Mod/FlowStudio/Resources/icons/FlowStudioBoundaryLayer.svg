<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#bl)"/>
  <!-- Wall surface (bottom) -->
  <rect x="10" y="44" width="44" height="6" rx="1" fill="#78909C"/>
  <!-- Inflation layers getting thicker away from wall -->
  <rect x="10" y="40" width="44" height="3" rx="0.5" fill="#B2DFDB" opacity="0.9"/>
  <rect x="10" y="35" width="44" height="4" rx="0.5" fill="#80CBC4" opacity="0.7"/>
  <rect x="10" y="28" width="44" height="6" rx="0.5" fill="#4DB6AC" opacity="0.5"/>
  <rect x="10" y="18" width="44" height="9" rx="0.5" fill="#26A69A" opacity="0.3"/>
  <!-- Dimension arrows -->
  <line x1="8" y1="40" x2="8" y2="44" stroke="#fff" stroke-width="1"/>
  <polygon points="7,41 8,39 9,41" fill="#fff"/>
  <line x1="8" y1="35" x2="8" y2="40" stroke="#fff" stroke-width="1"/>
  <line x1="8" y1="28" x2="8" y2="35" stroke="#fff" stroke-width="1"/>
  <!-- y+ label -->
  <text x="32" y="16" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#E0F2F1" text-anchor="middle">y+</text>
</svg>
