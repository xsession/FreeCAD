  <polygon points="17,29 21,32 17,35" fill="#EF5350"/>
  <line x1="46" y1="32" x2="54" y2="32" stroke="#EF5350" stroke-width="2" stroke-linecap="round"/>
  <polygon points="47,29 43,32 47,35" fill="#EF5350"/>
  <!-- Plus badge -->
