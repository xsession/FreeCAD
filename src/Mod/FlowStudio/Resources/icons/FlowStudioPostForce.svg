  <polygon points="29,13 32,7 35,13" fill="#4CAF50"/>
  <text x="38" y="12" font-family="Arial,sans-serif" font-weight="bold" font-size="7" fill="#4CAF50">L</text>
  <!-- Drag arrow (right) -->
  <line x1="42" y1="32" x2="56" y2="32" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="53,29 59,32 53,35" fill="#EF5350"/>
  <text x="56" y="42" font-family="Arial,sans-serif" font-weight="bold" font-size="7" fill="#EF5350">D</text>
  <!-- Moment arrow (curved) -->
  <path d="M20 48 A8,8 0 0,1 36 48" fill="none" stroke="#FFC107" stroke-width="2" stroke-linecap="round"/>
  <polygon points="34,46 38,50 34,52" fill="#FFC107"/>
