<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#fr)"/>
  <!-- Aerofoil shape -->
  <path d="M12 32 Q20 18,42 24 Q54 28,42 36 Q20 42,12 32Z" fill="#455A64" stroke="#B0BEC5" stroke-width="1.5"/>
