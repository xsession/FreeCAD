<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#ep)"/>
  <!-- Voltage symbol (V with arrows) -->
  <text x="32" y="28" font-family="Arial,sans-serif" font-weight="bold" font-size="22" fill="#5D4037" text-anchor="middle">V</text>
  <!-- Electrode plate -->
  <rect x="14" y="36" width="36" height="4" rx="1" fill="#5D4037"/>
  <!-- Electric field lines going down -->
  <line x1="22" y1="42" x2="22" y2="52" stroke="#795548" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="32" y1="42" x2="32" y2="52" stroke="#795548" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="42" y1="42" x2="42" y2="52" stroke="#795548" stroke-width="1.5" stroke-dasharray="2,2"/>
</svg>
