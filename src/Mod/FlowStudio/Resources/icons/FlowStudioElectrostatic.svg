<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="es" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#es)"/>
  <!-- Capacitor plates -->
  <rect x="20" y="12" width="4" height="36" rx="1" fill="#5D4037"/>
  <rect x="40" y="12" width="4" height="36" rx="1" fill="#5D4037"/>
  <!-- Electric field lines -->
  <line x1="26" y1="20" x2="38" y2="20" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="26" y1="26" x2="38" y2="26" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="26" y1="32" x2="38" y2="32" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="26" y1="38" x2="38" y2="38" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- + - signs -->
  <text x="16" y="54" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#5D4037" text-anchor="middle">+</text>
  <text x="48" y="54" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#5D4037" text-anchor="middle">-</text>
  <!-- Plus badge -->
  <circle cx="50" cy="50" r="10" fill="#4CAF50"/>
  <rect x="47" y="44" width="6" height="12" rx="1" fill="#fff"/>
  <rect x="44" y="47" width="12" height="6" rx="1" fill="#fff"/>
</svg>
