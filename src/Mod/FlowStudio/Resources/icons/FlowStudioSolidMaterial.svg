  <polygon points="32,34 12,22 12,42 32,54" fill="#78909C" opacity="0.7"/>
  <!-- Crystal lattice dots -->
  <circle cx="32" cy="10" r="2" fill="#fff"/>
  <circle cx="52" cy="22" r="2" fill="#fff"/>
  <circle cx="12" cy="22" r="2" fill="#fff"/>
  <circle cx="32" cy="34" r="2" fill="#fff"/>
  <circle cx="52" cy="42" r="2" fill="#B0BEC5"/>
  <circle cx="12" cy="42" r="2" fill="#B0BEC5"/>
