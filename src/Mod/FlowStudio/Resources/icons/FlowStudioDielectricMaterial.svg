<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#dm)"/>
  <!-- Dielectric slab between plates -->
  <rect x="14" y="14" width="4" height="32" rx="1" fill="#5D4037"/>
  <rect x="46" y="14" width="4" height="32" rx="1" fill="#5D4037"/>
  <rect x="20" y="16" width="24" height="28" rx="2" fill="#FFF8E1" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Epsilon_r label -->
  <text x="32" y="34" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#5D4037" text-anchor="middle">&#x03B5;r</text>
  <!-- + - -->
  <text x="12" y="54" font-family="Arial,sans-serif" font-weight="bold" font-size="12" fill="#5D4037" text-anchor="middle">+</text>
  <text x="52" y="54" font-family="Arial,sans-serif" font-weight="bold" font-size="12" fill="#5D4037" text-anchor="middle">-</text>
</svg>
